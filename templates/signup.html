{% extends 'base.html' %}
{% block title %}Sign Up - Intelligence Platform{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="auth-subtitle">Register to monitor social intelligence</p>
        <form method="POST" action="{{ url_for('signup') }}">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="johndoe_sec">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Create strong password">
            </div>
            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role" style="width:100%;padding:.75rem 1rem;border:1px solid var(--border-color);border-radius:8px;background:#0b1120;color:var(--text-main);font-size:1rem;">
                    <option value="Analyst">🔍 Analyst — Monitor and analyze threats</option>
                    <option value="Admin">🔧 Admin — Full platform management</option>
                    <option value="Viewer">👁 Viewer — Read-only access</option>
                </select>
                <small style="color:var(--text-muted);font-size:.78rem;margin-top:.3rem;display:block;">
                    Admins can manage users; Analysts can scan threats; Viewers can only read.
                </small>
            </div>
            <button type="submit" class="btn-primary w-100">Sign Up</button>
        </form>
        <div class="auth-links">
            <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
