{% extends 'base.html' %}

{% block title %}Watch Words - Intelligence Platform{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto; padding: 2rem; background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <h2>Add Watch Words</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Enter keywords to start monitoring social media streams. Separate multiple keywords with commas.</p>
    
    <form method="POST" action="{{ url_for('watchwords') }}">
        <div class="form-group">
            <label for="keywords">Keywords (e.g. ransomware, cyber attack, malware)</label>
            <input type="text" id="keywords" name="keywords" required placeholder="ransomware, cyber attack">
        </div>
        <button type="submit" class="btn-primary w-100">Start Monitoring</button>
    </form>
</div>
{% endblock %}
